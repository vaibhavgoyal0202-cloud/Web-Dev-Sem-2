<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: rgb(150, 236, 236);
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 15px;
            color: white;
            background-color: blue;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Largest Number Finder</h2>

        <input type="number" id="num1" placeholder="First Number"><br>
        <input type="number" id="num2" placeholder="Second Number"><br>
        <input type="number" id="num3" placeholder="Third Number"><br>

        <button onclick="findLargest()">Find Largest</button>

        <div id="result"></div>

        <script>
            function findLargest() {
                let a = Number(document.getElementById("num1").value);
                let b = Number(document.getElementById("num2").value);
                let c = Number(document.getElementById("num3").value);

                let largest;

                if (a >= b && a >= c) {
                    largest = a;
                } else if (b >= a && b >= c) {
                    largest = b;
                } else {
                    largest = c;
                }

                document.getElementById("result").innerHTML =
                    "Largest Number = " + largest;
            }
        </script>
    </div>
</body>
</html>
